<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Performance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/dashboard.css" />
</head>
<body>
  <header class="topbar topbar--dashboard">
    <div class="topbar__titles">
      <p class="eyebrow">Salesperson view</p>
      <h1>My performance</h1>
    </div>
    <div class="topbar__actions">
      <label class="sr-only" for="periodSelect">Commission period</label>
      <select id="periodSelect" class="control control--period" aria-label="Commission period"></select>
    </div>
  </header>

  <main class="shell shell--dashboard">
    <p id="dashboardStatus" class="dashboard-status" hidden></p>
    <section id="personalSummary" class="card-grid card-grid--summary"></section>

    <section class="panel panel--soft">
      <h2>Top 3 focus areas</h2>
      <ol id="focusAreas" class="focus-list"></ol>
    </section>

    <section class="panel panel--note">
      <h2>About your commission</h2>
      <p class="muted note-lead">
        Published commission totals are calculated when your manager runs period normalization.
        They are stored securely and shown here—this page does not recalculate pay.
      </p>
    </section>
  </main>

  <script type="module" src="./js/dashboards/salesperson-dashboard.js"></script>
</body>
</html>
