<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manager Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/dashboard.css" />
  <link rel="stylesheet" href="./css/modals.css" />
</head>
<body>
  <header class="topbar topbar--dashboard">
    <div class="topbar__titles">
      <p class="eyebrow">Manager view</p>
      <h1>Team commissions</h1>
    </div>
    <div class="topbar__actions">
      <label class="sr-only" for="periodSelect">Commission period</label>
      <select id="periodSelect" class="control control--period" aria-label="Commission period"></select>
    </div>
  </header>

  <main class="shell shell--dashboard">
    <p id="dashboardStatus" class="dashboard-status" hidden></p>
    <section id="summaryCards" class="card-grid card-grid--summary"></section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>Team Performance</h2>
          <p class="muted">Clean overview first. Drill into a salesperson only when needed.</p>
        </div>
      </div>
      <div class="responsive-table">
        <table>
          <thead>
            <tr>
              <th>Salesperson</th>
              <th>Units</th>
              <th>Finance %</th>
              <th>Aftercare PPV</th>
              <th>Accessory GP</th>
              <th>Total Comm</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="teamRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="reviewModal" class="modal">
    <div class="modal-head">
      <div>
        <p class="eyebrow">Performance Review Mode</p>
        <h2 id="reviewTitle">Salesperson Review</h2>
      </div>
      <button id="closeReview" class="icon-button">×</button>
    </div>
    <div id="reviewBody" class="modal-body"></div>
  </dialog>

  <script type="module" src="./js/dashboards/manager-dashboard.js"></script>
</body>
</html>
